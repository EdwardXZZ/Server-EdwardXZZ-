<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saki Images - Subidor de Imágenes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14; --card: #131820; --border: #2a2e3a;
            --acc: #6c5ce7; --acc2: #a29bfe; --text: #e4e4e7;
            --text2: #a1a1aa; --ok: #10b981; --err: #ef4444;
            --font: 'Inter', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 16px 24px; text-align: center;
        }
        .header h1 { font-size: 24px; color: var(--acc2); }
        .header p { color: var(--text2); font-size: 13px; margin-top: 4px; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }
        
        /* Zona de subida */
        .upload-zone {
            background: var(--card); border: 2px dashed var(--border);
            border-radius: 18px; padding: 48px; text-align: center;
            transition: all 0.3s; cursor: pointer; margin-bottom: 28px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--acc); background: rgba(108,92,231,0.05);
        }
        .upload-zone .icon { font-size: 56px; margin-bottom: 12px; }
        .upload-zone h3 { font-size: 18px; margin-bottom: 6px; }
        .upload-zone p { color: var(--text2); font-size: 13px; }
        .upload-zone input { display: none; }
        
        /* Grid de imágenes */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
        .image-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; transition: all 0.2s;
        }
        .image-card:hover { border-color: var(--acc); transform: translateY(-2px); }
        .image-card img {
            width: 100%; height: 180px; object-fit: cover; display: block;
        }
        .image-info { padding: 12px; }
        .image-info .name { font-size: 12px; color: var(--text2); word-break: break-all; margin-bottom: 6px; }
        .image-info .meta { font-size: 10px; color: var(--text2); display: flex; justify-content: space-between; }
        .image-info .expira { color: var(--warn); }
        .image-actions { display: flex; gap: 6px; padding: 0 12px 12px; }
        .btn {
            padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer;
            font-size: 12px; font-weight: 600; font-family: var(--font); transition: all 0.2s;
        }
        .btn-copy { background: var(--acc); color: #fff; flex:1; }
        .btn-copy:hover { background: #7c6cf0; }
        .btn-delete { background: rgba(239,68,68,0.1); color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,0.2); }
        .btn-copied { background: var(--ok); color: #fff; }
        
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
        .alert-ok { background: rgba(16,185,129,0.1); color: #6ee7b7; }
        .alert-err { background: rgba(239,68,68,0.1); color: #fca5a5; }
        .empty { text-align: center; padding: 48px; color: var(--text2); }
        
        /* Progress bar */
        .progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: var(--acc); width: 0%; transition: width 0.3s; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🖼️ Saki Images</h1>
    <p>Sube imágenes • 60 días de duración • 10 MB máximo</p>
</div>

<div class="container">
    <div id="alertContainer"></div>

    <!-- Zona de subida -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📤</div>
        <h3>Arrastra tu imagen aquí</h3>
        <p>o haz clic para seleccionar • PNG, JPG, GIF, WEBP</p>
        <input type="file" id="fileInput" accept="image/*" onchange="subirImagen(this.files[0])">
        <div class="progress" id="progressBar"><div class="progress-bar" id="progressFill"></div></div>
    </div>

    <!-- Grid de imágenes -->
    <div class="grid" id="imagesGrid"></div>
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const imagesGrid = document.getElementById('imagesGrid');

// Cargar imágenes
fetch('/api/images').then(r => r.json()).then(renderImages);

// Drag and drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) subirImagen(e.dataTransfer.files[0]);
});

function subirImagen(file) {
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) return alert('Máximo 10 MB');
    
    const formData = new FormData();
    formData.append('image', file);
    
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = '0%';
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
            document.getElementById('progressFill').style.width = (e.loaded / e.total * 100) + '%';
        }
    };
    xhr.onload = () => {
        document.getElementById('progressBar').style.display = 'none';
        if (xhr.status === 200) {
            showAlert('✅ Imagen subida correctamente', 'ok');
            fetch('/api/images').then(r => r.json()).then(renderImages);
        } else {
            showAlert('❌ Error al subir', 'err');
        }
    };
    xhr.open('POST', '/api/upload');
    xhr.send(formData);
}

function renderImages(images) {
    if (!images.length) {
        imagesGrid.innerHTML = '<div class="empty">📭 No hay imágenes aún</div>';
        return;
    }
    imagesGrid.innerHTML = images.map(img => {
        const diasRestantes = Math.max(0, Math.floor((new Date(img.expira) - new Date()) / 86400000));
        return `
            <div class="image-card">
                <img src="${img.url}" alt="${img.originalname}" loading="lazy">
                <div class="image-info">
                    <div class="name">${img.originalname}</div>
                    <div class="meta">
                        <span>${formatSize(img.size)}</span>
                        <span class="expira">⏳ ${diasRestantes}d</span>
                    </div>
                </div>
                <div class="image-actions">
                    <button class="btn btn-copy" onclick="copiarUrl('${window.location.origin}${img.url}')">📋 Copiar</button>
                    <button class="btn btn-delete" onclick="eliminar('${img.id}')">🗑</button>
                </div>
            </div>
        `;
    }).join('');
}

function copiarUrl(url) {
    navigator.clipboard.writeText(url).then(() => showAlert('✅ URL copiada', 'ok'));
}

function eliminar(id) {
    if (!confirm('¿Eliminar esta imagen?')) return;
    fetch('/api/images/' + id, { method: 'DELETE' }).then(() => {
        fetch('/api/images').then(r => r.json()).then(renderImages);
    });
}

function showAlert(msg, type) {
    document.getElementById('alertContainer').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => document.getElementById('alertContainer').innerHTML = '', 3000);
}

function formatSize(bytes) {
    if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1024).toFixed(0) + ' KB';
}
</script>
</body>
</html>
